services:

  client:
    build: ./client/aquaripple-ui
    ports:
      - "5173:5173"
    volumes:
      - ./client/aquaripple-ui:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000

  server:
    build: ./server/AquaRipple.Api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDbSettings__ConnectionString=mongodb://mongo:27017
      - MongoDbSettings__DatabaseName=aquaripple
      - Analytics__BaseUrl=http://analytics:8001
      - GetWet__BaseUrl=https://getwet-eha7a2fufhhyenae.australiaeast-01.azurewebsites.net
      - GetWet__ApiKey=${GETWET_API_KEY}
    depends_on:
      - mongo
    dns:
      - 8.8.8.8
      - 8.8.4.4

  analytics:
    build: ./analytics
    ports:
      - "8001:8001"
    environment:
      - ENV=development

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: