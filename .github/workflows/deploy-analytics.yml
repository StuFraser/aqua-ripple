name: Deploy Analytics to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'analytics/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via Azure CLI
        run: |
          cd analytics
          zip -r ../analytics-deploy.zip . -x "*.pyc" -x "__pycache__/*" -x ".env" -x ".venv/*"
          az webapp deploy \
            --name ${{ secrets.AZURE_ANALYTICS_APP_NAME }} \
            --resource-group AquaRipple \
            --src-path ../analytics-deploy.zip \
            --type zip \
            --async false
